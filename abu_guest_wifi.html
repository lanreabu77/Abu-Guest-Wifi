<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abu Guest Wi‑Fi</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --card: rgba(255,255,255,0.10);
      --border: rgba(255,255,255,0.18);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #1d4ed8 0%, transparent 35%),
        radial-gradient(circle at bottom right, #0ea5e9 0%, transparent 30%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }
    .badge {
      display: inline-block;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(56,189,248,0.15);
      color: #bae6fd;
      border: 1px solid rgba(56,189,248,0.25);
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.5;
    }
    .field {
      margin: 16px 0;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
    }
    .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #bae6fd;
      margin-bottom: 8px;
    }
    .value {
      font-size: 22px;
      font-weight: 700;
      word-break: break-word;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      background: white;
      color: #0f172a;
    }
    button.secondary {
      background: rgba(255,255,255,0.12);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.16);
    }
    .note {
      margin-top: 18px;
      font-size: 14px;
      color: var(--muted);
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.92);
      color: white;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Guest Wi‑Fi</div>
    <h1>Connect to Wi‑Fi</h1>
    <p>Open your Wi‑Fi settings, select the network below, then copy and paste the password.</p>

    <section class="field">
      <div class="label">Network name</div>
      <div class="value" id="ssid">Abu Guest</div>
      <div class="actions">
        <button onclick="copyValue('ssid', 'Network name copied')">Copy network name</button>
      </div>
    </section>

    <section class="field">
      <div class="label">Password</div>
      <div class="value" id="password">Welcomehere</div>
      <div class="actions">
        <button onclick="copyValue('password', 'Password copied')">Copy password</button>
      </div>
    </section>

    <div class="actions" style="margin-top: 18px;">
      <button class="secondary" onclick="openSettings()">Open Wi‑Fi settings</button>
    </div>

    <div class="note">
      On iPhone, NFC can open this page, but joining Wi‑Fi still needs to be done in Settings.
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    async function copyValue(id, message) {
      const text = document.getElementById(id).innerText;
      try {
        await navigator.clipboard.writeText(text);
        showToast(message);
      } catch (e) {
        const temp = document.createElement('textarea');
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
        showToast(message);
      }
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function openSettings() {
      window.location.href = 'App-Prefs:root=WIFI';
    }
  </script>
</body>
</html>
